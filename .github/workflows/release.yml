name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nodejs npm libsdl2-2.0-0 libglib2.0-0 libpixman-1-0 zlib1g libsndio7.0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install Pebble Tool
        run: uv tool install pebble-tool

      - name: Install Pebble SDK
        run: pebble sdk install latest

      - name: Build
        run: pebble build

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/ReVolver.pbw
          generate_release_notes: true
